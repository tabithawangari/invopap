version: '3.8'

services:
  invopap-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: invopap-telegram-bot
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      API_BASE_URL: ${API_BASE_URL:-http://host.docker.internal:3000}
      NODE_ENV: ${NODE_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    restart: unless-stopped
    networks:
      - invopap-network

  # Optional: Use Redis for scaling to multiple bot instances
  redis:
    image: redis:7-alpine
    container_name: invopap-bot-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - invopap-network
    profiles:
      - with-redis

networks:
  invopap-network:
    driver: bridge
